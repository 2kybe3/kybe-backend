<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="my (2kybe3, kybe, kybe236) site" />
    <link rel="preconnect" href="https://kybe.xyz" />

    <title>{{title}}</title>

    <style>
      html {
        height: 100%;
      }

      body {
        font-family: "DepartureMono", sans-serif;
        font-size: 13px;

        background-color: #0a1026;
        color: #ffffff;

        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        white-space: pre;
      }

      main {
        padding: 25px;
        overflow-x: auto;
      }

      pre {
        position: relative;
        background-color: #0a1026;

        border: 1px solid #243885;
        border-radius: 4px;

        margin-top: 1em;
        padding: 0.5em;
      }

      code {
        padding: 0.2rem;
        display: block;
      }

      .copy-btn {
        position: absolute;
        top: 0.3em;
        right: 0.3em;
        background-color: #243885;
        border: none;
        color: #ffffff;
        font-size: 13px;
        padding: 2px 6px;
        cursor: pointer;
        border-radius: 3px;
      }

      .copy-btn:active {
        background-color: #294390;
      }

      @font-face {
        font-family: "DepartureMono";
        src:
          url("static/DepartureMono-1.500/DepartureMono-Regular.woff2")
            format("woff2"),
          url("static/DepartureMono-1.500/DepartureMono-Regular.otf")
            format("opentype"),
          url("static/DepartureMono-1.500/DepartureMono-Regular.woff")
            format("woff");

        font-weight: normal;
        font-style: normal;

        font-display: swap;
      }
    </style>
  </head>

  <body>
    <main>{{content}}</main>
    <a rel="me" href="https://mastodon.kybe.xyz/@kybe"></a>
    <script>
      document.querySelectorAll("pre").forEach((pre) => {
        const button = document.createElement("button");
        button.innerText = "Copy";
        button.className = "copy-btn";
        pre.appendChild(button);

        button.addEventListener("click", () => {
          const copyText = Array.from(pre.querySelectorAll(".copyable"))
            .map((el) => el.innerText)
            .join("");
          navigator.clipboard.writeText(copyText).then(() => {
            button.innerText = "Copied";
            setTimeout(() => (button.innerText = "Copy"), 1000);
          });
        });
      });
    </script>
    {{umami}}
  </body>
</html>
