services:
  kybe-backend:
    image: reg.kybe.xyz/kybe-pub/kybe-backend:latest
    container_name: kybe-backend
    ports:
      - "3000:3000"
      - "2222:2222"
    restart: unless-stopped
    volumes:
      - ./backend/config:/opt/backend/config
    environment:
      - KYBE_DATABASE_POSTGRES_URL=postgres://kybe:kybe@postgres:5432/kybe_db
    depends_on:
      - postgres

  postgres:
    image: postgres:18.4-alpine@sha256:d3e64d36360a9f40c30fbbc5dd2dde799fe35f8537500c8b067551a6497f50f4
    container_name: kybe-postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      POSTGRES_USER: kybe
      POSTGRES_PASSWORD: kybe
      POSTGRES_DB: kybe_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
