name: Build and Deploy
on:
  push:
    branches:
      - main

env:
  IMAGE: reg.kybe.xyz/kybe-pub/kybe-backend
  REGISTRY_URL: reg.kybe.xyz
  TAG: ${{ github.sha }}

jobs:
  deploy-backend:
    name: Build, Push & Deploy Backend
    runs-on: docker
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest
    if: forgejo.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - name: Write git SHA to file
        run: |
          mkdir -p assets
          echo "$GITHUB_SHA" > assets/git.sha

      - name: Log in to private registry
        uses: https://github.com/docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ vars.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}

      - name: Set up Docker Buildx
        uses: https://github.com/docker/setup-buildx-action@v3

      - name: Build and push image
        uses: https://github.com/docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}

      - name: Copy docker-compose.yml to server
        uses: https://github.com/appleboy/ssh-action@master
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.RUNNER_SSH_KEY }}
          overwrite: true
          source: "docker-compose.yml"
          target: "/opt/backend/"

      - name: Deploy to production server
        uses: https://github.com/appleboy/ssh-action@master
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.RUNNER_SSH_KEY }}
          script: |
            echo "${{ secrets.REGISTRY_PASS }}" | docker login ${{ env.REGISTRY_URL }} -u "${{ vars.REGISTRY_USER }}" --password-stdin
            
            cd /opt/backend
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
          envs: REGISTRY_URL,REGISTRY_USER
