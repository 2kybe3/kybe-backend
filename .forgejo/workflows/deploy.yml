name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  LOCAL_TAG: kybe-backend:latest
  REMOTE_TAG: reg.kybe.xyz/kybe-pub/kybe-backend
  REGISTRY_URL: reg.kybe.xyz
  TAG: ${{ github.sha }}

jobs:
  deploy:
    name: Build, Push & Deploy Backend
    runs-on: self-hosted
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest@sha256:94b8798401e000215df1d86e925d2dc8e3695a9c5202dbcbb8486040ab8474c1

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: https://github.com/cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Setup Attic
        id: attic
        run: |
          nix profile install .#ci
          attic login main https://attic.kybe.xyz/main ${{ secrets.ATTIC_KEY }}
          attic use main

      - name: Build image
        run: nix build .#image -L -v --no-update-lock-file

      - name: Load image
        run: docker load < ./result

      - name: Tag Docker image
        run: docker tag ${{ env.LOCAL_TAG }} ${{ env.REMOTE_TAG }}

      - name: Log in to private registry
        uses: https://github.com/docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ vars.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}

      - name: Push image
        run: docker push ${{ env.REMOTE_TAG }}

      - name: Copy docker-compose.yml to server
        uses: https://github.com/appleboy/ssh-action@1530429296e979861824d74fb800013190b5dee0 # master
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.RUNNER_SSH_KEY }}
          overwrite: true
          source: "docker-compose.yml"
          target: "/opt/backend/"

      - name: Deploy to production server
        uses: https://github.com/appleboy/ssh-action@1530429296e979861824d74fb800013190b5dee0 # master
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.RUNNER_SSH_KEY }}
          script: |
            echo "${{ secrets.REGISTRY_PASS }}" | docker login ${{ env.REGISTRY_URL }} -u "${{ vars.REGISTRY_USER }}" --password-stdin

            cd /opt/backend
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
          envs: REGISTRY_URL,REGISTRY_USER

      - name: Push to Attic
        if: ${{ steps.attic.conclusion == 'success' }}
        run: attic push main --ignore-upstream-cache-filter -j 64 $(ls -d /nix/store/*/)
