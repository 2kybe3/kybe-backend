name: Build and Deploy
on:
  push:
    branches:
      - main

env:
  IMAGE: reg.kybe.xyz/kybe-pub/kybe-backend
  REGISTRY_URL: reg.kybe.xyz
  TAG: ${{ github.sha }}

jobs:
  deploy-backend:
    name: Build, Push & Deploy Backend
    runs-on: docker
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest@sha256:ba462524eef12b7af3ed50b97d29c5c5eb7ba0eacb26d338d4c3957bbda76d58
    if: forgejo.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Write git SHA to file
        run: |
          mkdir -p assets
          echo "$GITHUB_SHA" > assets/git.sha

      - name: Log in to private registry
        uses: https://github.com/docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ vars.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}

      - name: Set up Docker Buildx
        uses: https://github.com/docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push image
        uses: https://github.com/docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}

      - name: Copy docker-compose.yml to server
        uses: https://github.com/appleboy/ssh-action@1530429296e979861824d74fb800013190b5dee0 # master
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.RUNNER_SSH_KEY }}
          overwrite: true
          source: "docker-compose.yml"
          target: "/opt/backend/"

      - name: Deploy to production server
        uses: https://github.com/appleboy/ssh-action@1530429296e979861824d74fb800013190b5dee0 # master
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.RUNNER_SSH_KEY }}
          script: |
            echo "${{ secrets.REGISTRY_PASS }}" | docker login ${{ env.REGISTRY_URL }} -u "${{ vars.REGISTRY_USER }}" --password-stdin
            
            cd /opt/backend
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
          envs: REGISTRY_URL,REGISTRY_USER
