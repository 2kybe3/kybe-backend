name: Lint
on: [push]

jobs:
  lint:
    name: Lint (Clippy + fmt)
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable Rust toolchain
        uses: https://github.com/dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - name: Write git SHA to file
        run: |
          mkdir -p assets
          echo "$GITHUB_SHA" > assets/git.sha

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check
