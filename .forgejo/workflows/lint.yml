name: Lint

on: [push]

jobs:
  lint:
    runs-on: self-hosted
    container:
      image: ghcr.io/catthehacker/ubuntu:act-latest@sha256:b302f465fc3a466e5e222808edd59997842544853102fda7766147e998bbdc02

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: https://github.com/cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Setup Attic
        id: attic
        run: |
          nix profile add "nixpkgs#attic-client"
          attic login main https://attic.kybe.xyz/main ${{ secrets.ATTIC_KEY }}
          attic use main

      - name: Lint
        run: nix flake check . -L --no-update-lock-file

      - name: Push to Attic
        if: ${{ steps.attic.conclusion == 'success' }}
        run: attic push main --ignore-upstream-cache-filter -j 64 $(ls -d /nix/store/*/)
